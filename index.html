<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Simple Calculator</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div id="container">
            <div id="calculator">
                <div id="display-container">
                    <div id="first-display">
                        <input type="text" id="display-equation" disabled />
                    </div>
                    <div id="second-display">
                        <input type="text" id="display-current" disabled />
                    </div>
                </div>

                <div id="buttons">
                    <button class="btn btn-top" data-action="backspace">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-backspace" viewBox="0 0 16 16">
                            <path d="M5.83 5.146a.5.5 0 0 0 0 .708L7.975 8l-2.147 2.146a.5.5 0 0 0 .707.708l2.147-2.147 2.146 2.147a.5.5 0 0 0 .707-.708L9.39 8l2.146-2.146a.5.5 0 0 0-.707-.708L8.683 7.293 6.536 5.146a.5.5 0 0 0-.707 0z"/>
                            <path d="M13.683 1a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-7.08a2 2 0 0 1-1.519-.698L.241 8.65a1 1 0 0 1 0-1.302L5.084 1.7A2 2 0 0 1 6.603 1zm-7.08 1a1 1 0 0 0-.76.35L1 8l4.844 5.65a1 1 0 0 0 .759.35h7.08a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/>
                        </svg>
                    </button>
                    <button class="btn btn-top" data-action="clear">C</button>
                    <button class="btn btn-top" data-action="percent">%</button>
                    <button class="btn btn-side" data-operator="/">/</button>

                    <button class="btn" data-value="1">1</button>
                    <button class="btn" data-value="2">2</button>
                    <button class="btn" data-value="3">3</button>
                    <button class="btn btn-side" data-operator="*">×</button>

                    <button class="btn" data-value="4">4</button>
                    <button class="btn" data-value="5">5</button>
                    <button class="btn" data-value="6">6</button>
                    <button class="btn btn-side" data-operator="-">-</button>

                    <button class="btn" data-value="7">7</button>
                    <button class="btn" data-value="8">8</button>
                    <button class="btn" data-value="9">9</button>
                    <button class="btn btn-side" data-operator="+">+</button>

                    <button class="btn btn-top" data-action="history">H</button>
                    <button class="btn" data-value="0">0</button>
                    <button class="btn" data-value=".">.</button>
                    <button class="btn btn-side" data-action="equals">=</button>
                </div>
                <div id="history-panel">
                    <div id="history-header">
                        <h2>Recents</h2>
                        <button id="history-close">✕</button>
                    </div>
                    <div id="history-list-container">
                        <ul id="history-list">
                            <!-- <li class="history-item">2 + 2 = 4</li> -->
                        </ul>
                    </div>
                </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
