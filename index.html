<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Simple Calculator</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div id="container">
            <div id="calculator">
                <div id="display-container">
                    <div id="selected-numbers">
                        <input type="text" id="selected-display" disabled>
                    </div>
                    <div id="result">
                        <input type="text" id="display" disabled>
                    </div>
                </div>

                <div id="buttons">
                    <button id="remove-last" class="top-btn"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-backspace" viewBox="0 0 16 16">
  <path d="M5.83 5.146a.5.5 0 0 0 0 .708L7.975 8l-2.147 2.146a.5.5 0 0 0 .707.708l2.147-2.147 2.146 2.147a.5.5 0 0 0 .707-.708L9.39 8l2.146-2.146a.5.5 0 0 0-.707-.708L8.683 7.293 6.536 5.146a.5.5 0 0 0-.707 0z"/>
  <path d="M13.683 1a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-7.08a2 2 0 0 1-1.519-.698L.241 8.65a1 1 0 0 1 0-1.302L5.084 1.7A2 2 0 0 1 6.603 1zm-7.08 1a1 1 0 0 0-.76.35L1 8l4.844 5.65a1 1 0 0 0 .759.35h7.08a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/>
</svg></button>
                    <button id="clear-all" class="top-btn">C</button>
                    <button id="percent" class="top-btn">%</button>
                    <button id="division" class="side-btn">/</button>

                    <button id="one">1</button>
                    <button id="two">2</button>
                    <button id="three">3</button>
                    <button class="side-btn" id="multiplication">×</button>

                    <button id="four">4</button>
                    <button id="five">5</button>
                    <button id="six">6</button>
                    <button class="side-btn" id="subtraction">-</button>

                    <button id="seven">7</button>
                    <button id="eight">8</button>
                    <button id="nine">9</button>
                    <button class="side-btn" id="addition">+</button>

                    <button id="history">H</button>
                    <button id="zero">0</button>
                    <button id="decimal">.</button>
                    <button class="side-btn" id="equals">=</button>
                </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
